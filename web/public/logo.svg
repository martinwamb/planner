<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#111827"/>

  <!-- Calendar header bar -->
  <rect x="12" y="12" width="40" height="8" rx="3" fill="#6366f1"/>

  <!-- Calendar grid lines (rows) -->
  <!-- Row 1 -->
  <rect x="12" y="24" width="18" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="34" y="24" width="18" height="3" rx="1.5" fill="white" opacity="0.4"/>

  <!-- Row 2 -->
  <rect x="12" y="31" width="26" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="42" y="31" width="10" height="3" rx="1.5" fill="white" opacity="0.4"/>

  <!-- Row 3 -->
  <rect x="12" y="38" width="14" height="3" rx="1.5" fill="#10b981" opacity="0.9"/>
  <rect x="30" y="38" width="22" height="3" rx="1.5" fill="white" opacity="0.4"/>

  <!-- Row 4 — checkmark row -->
  <rect x="12" y="45" width="22" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="38" y="45" width="14" height="3" rx="1.5" fill="white" opacity="0.4"/>

  <!-- Small priority dot on row 1 -->
  <circle cx="8" cy="25.5" r="2.5" fill="#f43f5e"/>
  <!-- Small dot row 2 -->
  <circle cx="8" cy="32.5" r="2.5" fill="#f59e0b"/>
  <!-- Small dot row 3 (done) -->
  <circle cx="8" cy="39.5" r="2.5" fill="#10b981"/>
  <!-- Small dot row 4 -->
  <circle cx="8" cy="46.5" r="2.5" fill="#6366f1"/>
</svg>
